<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Floating Star Background</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: #071a2f; /* navy blue */
        perspective: 800px;
    }

    /* STAR FIELD */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        overflow: hidden;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: floatStar linear infinite;
    }

    /* 3D FLOATING EFFECT */
    @keyframes floatStar {
        0% {
            transform: translate3d(0, 0, 0) scale(0.5);
            opacity: 0;
        }
        20% {
            opacity: 1;
        }
        100% {
            transform: translate3d(0, -120vh, 600px) scale(1.2);
            opacity: 0;
        }
    }

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<script>
    const container = document.getElementById("stars");

    for (let i = 0; i < 150; i++) {
        let star = document.createElement("div");
        star.classList.add("star");

        // random position
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";

        // random size
        let size = Math.random() * 2 + 1;
        star.style.width = size + "px";
        star.style.height = size + "px";

        // animation speed variation
        let duration = Math.random() * 6 + 4;
        star.style.animationDuration = duration + "s";

        star.style.animationDelay = Math.random() * 5 + "s";

        container.appendChild(star);
    }
</script>

</body>
</html>
