<!DOCTYPE html>

<meta charset="UTF-8">
<title>Galaxy Background</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: #071a2f; /* deep navy */
    }

    /* STARS */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .stars span {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: blink 4s infinite ease-in-out;
    }

    @keyframes blink {
        0%, 100% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 1; transform: scale(1.2); }
    }

    /* GALAXY NEBULA GLOW */
    .nebula {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle,
            rgba(29,185,84,0.18),
            rgba(0,255,200,0.08),
            transparent 70%
        );
        filter: blur(60px);
        border-radius: 50%;
        animation: floatNebula 12s ease-in-out infinite alternate;
        opacity: 0.7;
    }

    .nebula:nth-child(1) {
        top: 10%;
        left: 15%;
    }

    .nebula:nth-child(2) {
        bottom: 10%;
        right: 10%;
        background: radial-gradient(circle,
            rgba(120, 100, 255, 0.15),
            rgba(29,185,84,0.05),
            transparent 70%
        );
        animation-duration: 15s;
    }

    @keyframes floatNebula {
        0% {
            transform: translateY(0px) scale(1);
        }
        100% {
            transform: translateY(-40px) scale(1.1);
        }
    }

</style>
</head>

<body>

<!-- GALAXY NEBULA -->
<div class="nebula"></div>
<div class="nebula"></div>

<!-- STARS -->
<div class="stars" id="stars"></div>

<script>
    const container = document.getElementById("stars");

    for (let i = 0; i < 120; i++) {
        let star = document.createElement("span");

        star.style.top = Math.random() * 100 + "vh";
        star.style.left = Math.random() * 100 + "vw";

        star.style.animationDuration = (2 + Math.random() * 5) + "s";
        star.style.animationDelay = Math.random() * 5 + "s";

        container.appendChild(star);
    }
</script>
