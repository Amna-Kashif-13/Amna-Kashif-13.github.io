<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimra Tanveer | Software QA Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* GLOBAL TYPOGRAPHY SMALLER */
        body {
            font-size: 14px;
        }

        /* SMOOTHER BACKGROUND (NO BLINKING) */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: radial-gradient(circle at 20% 20%, rgba(29,185,84,0.12), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(29,185,84,0.08), transparent 45%),
                        #0a0a0a;
            animation: moveBg 12s ease-in-out infinite alternate;
        }

        @keyframes moveBg {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }

        /* PROFILE CIRCLE FRAME */
        .profile-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            padding: 8px;
            background: linear-gradient(145deg, #1db954, #0f2f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(29,185,84,0.25);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-[#0a0a0a] text-white selection:bg-[#1db954] selection:text-white">

<!-- BACKGROUND -->
<div class="bg-animated"></div>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- NAV -->
<nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-[#0a0a0a]/70 backdrop-blur-md border-b border-gray-900">
    <div class="text-lg font-bold">NT<span class="text-[#1db954]">.</span></div>
</nav>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center px-6">

    <div class="flex flex-col-reverse md:flex-row items-center gap-10 text-center md:text-left">

        <div>
            <h2 class="text-[#1db954] tracking-widest uppercase mb-3 text-xs">Hello, I'm</h2>
            <h1 class="text-3xl md:text-5xl font-bold mb-4">Nimra Tanveer</h1>
            <p class="text-gray-400 max-w-xl">
                Full Stack & QA Engineer ensuring quality and smooth user experiences.
            </p>
        </div>

        <!-- PROFILE CIRCLE -->
        <div class="profile-circle">
            <img src="myImage.png" alt="profile">
        </div>

    </div>

</section>

</body>
</html>
