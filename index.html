<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amna Kashif Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin: 0;
    background: #071a2f;
    color: white;
    overflow-x: hidden;
    font-family: sans-serif;
}
.animated-name {
    font-size: 80px;
    font-weight: 700;
    color: white;
    text-align: left;
    margin-bottom: 20px;

    /* ONLY WHITE + SOFT BLUE GLOW */
    animation: softGlow 2.5s ease-in-out infinite alternate;
}

@keyframes softGlow {
    from {
        text-shadow: 0 0 6px rgba(255,255,255,0.2);
        transform: translateY(0px);
    }
    to {
        text-shadow: 0 0 12px rgba(200,220,255,0.4);
        transform: translateY(-4px);
    }
}

/* glow animation */
@keyframes glowText {
    from {
        text-shadow: 0 0 5px #1db954, 0 0 10px #1db954;
        transform: translateY(0px);
    }
    to {
        text-shadow: 0 0 15px #1db954, 0 0 30px #4fd1c5;
        transform: translateY(-5px);
    }
}
/* ===== GALAXY BACKGROUND ===== */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: blink 4s infinite ease-in-out;
}

@keyframes blink {
    0%,100% {opacity:0; transform:scale(0.5);}
    50% {opacity:1; transform:scale(1.2);}
}

.nebula {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.7;
    z-index: 0;
    background: radial-gradient(circle, rgba(29,185,84,0.18), transparent);
    animation: float 12s infinite alternate;
}

.nebula:nth-child(1){
    top:10%;
    left:15%;
}

.nebula:nth-child(2){
    bottom:10%;
    right:10%;
    background: radial-gradient(circle, rgba(120,100,255,0.15), transparent);
    animation-duration:15s;
}

@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-40px);}
}

/* ===== HEADER NAV ===== */
header{
    position:relative;
    z-index:50;
    display:flex;
    justify-content:space-between;
    padding:20px 30px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:white;
}

.nav-btn{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border:1px solid rgba(79,209,197,0.6);
    border-radius:20px;
    font-size:14px;
    transition:0.3s;
}

.nav-btn:hover{
    box-shadow:0 0 12px rgba(79,209,197,0.6);
    transform:translateY(-2px);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    align-items: flex-start;   /* top align */
    justify-content: flex-start;
    text-align: left;

    padding: 90px 100px 0 100px;  /* 👈 earlier se kam top padding */
}

.hero h1 {
    font-size: 5rem;
    font-weight: 800;
}

.hero h2 {
    color: #1db954;
    letter-spacing: 2px;
}

.hero p {
    font-size: 1.5rem;
    color: #ddd;
    max-width: 600px;
}

.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 28px;
    background: #1db954;
    color: black;
    font-weight: bold;
    border-radius: 30px;
    text-decoration: none;
}

.btn:hover {
    background: white;
}
    .hire-btn {
    font-size: 15px;
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 22px;
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
}

.hire-btn:hover {
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 0 10px rgba(255,255,255,0.2),
                0 0 20px rgba(150,180,255,0.15);
    transform: translateY(-2px);
}

.hire-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: 0.5s;
}

.hire-btn:hover::after {
    left: 100%;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="nebula"></div>
<div class="nebula"></div>
<div class="stars" id="stars"></div>

<script>
const stars = document.getElementById("stars");

for(let i=0;i<120;i++){
    let s=document.createElement("span");
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(2+Math.random()*5)+"s";
    stars.appendChild(s);
}
</script>

<!-- HEADER -->
<header>
    <div class="logo">AK<span style="color:#1db954;">.</span></div>

    <nav style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="nav-btn" href="#about">About</a>
        <a class="nav-btn" href="#skills">Skills</a>
        <a class="nav-btn" href="#courses">Courses</a>
        <a class="nav-btn" href="#projects">Projects</a>
        <a class="nav-btn" href="#experience">Experience</a>
        <a class="nav-btn" href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">

    <div>

        <h2>Hello, I'm</h2>

      <h1 class="animated-name">
    Amna Kashif
</h1>

        <p>
            Amazon Virtual Assistant <br>
            Helping Amazon sellers optimize listings, manage stores, and increase sales with professional virtual assistance.
        </p>

       <a href="#contact"
   class="nav-btn hire-btn">
    Hire Me
</a>

    </div>

</section>

</body>
</html>
