<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  height: 100vh;
  background: #007BFF;
  overflow: hidden;
}

/* 🔵 blinking dots */
.dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  animation: blink 1.5s infinite;
  opacity: 0;
}

/* random positions */
.dot:nth-child(1){top:10%;left:20%;animation-delay:0s;}
.dot:nth-child(2){top:30%;left:70%;animation-delay:0.3s;}
.dot:nth-child(3){top:50%;left:40%;animation-delay:0.6s;}
.dot:nth-child(4){top:80%;left:60%;animation-delay:0.9s;}
.dot:nth-child(5){top:20%;left:90%;animation-delay:1.2s;}

@keyframes blink {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
}
</style>
</head>

<body>

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

</body>
</html>
