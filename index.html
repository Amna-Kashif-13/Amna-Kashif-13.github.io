<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wave + Stars Background</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: #071a2f; /* navy blue */
    }

    /* STARS */
    .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
    }

    .stars span {
        position: absolute;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: blink 4s infinite ease-in-out;
    }

    @keyframes blink {
        0%, 100% { opacity: 0; transform: scale(0.5); }
        50% { opacity: 1; transform: scale(1.3); }
    }

    /* WAVE SECTION */
    .wave {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 200%;
        height: 200px;
        background: rgba(29, 185, 84, 0.15);
        border-radius: 50%;
        animation: waveMove 8s linear infinite;
        filter: blur(20px);
        z-index: 1;
    }

    .wave:nth-child(2) {
        bottom: -50px;
        opacity: 0.6;
        animation-duration: 12s;
    }

    .wave:nth-child(3) {
        bottom: -80px;
        opacity: 0.3;
        animation-duration: 15s;
    }

    @keyframes waveMove {
        0% { transform: translateX(0) rotate(0deg); }
        100% { transform: translateX(-50%) rotate(360deg); }
    }

</style>
</head>

<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- WAVES -->
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<script>
    // stars generator
    const container = document.getElementById("stars");

    for (let i = 0; i < 120; i++) {
        let star = document.createElement("span");

        star.style.top = Math.random() * 100 + "vh";
        star.style.left = Math.random() * 100 + "vw";

        star.style.animationDuration = (2 + Math.random() * 5) + "s";
        star.style.animationDelay = Math.random() * 5 + "s";

        container.appendChild(star);
    }
</script>

</body>
</html>
