<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ ADDED FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amna Kashif Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: #071a2f;
    color: white;
    overflow-x: hidden;
    font-family: sans-serif;
}

/* ===== NAME ANIMATION ===== */
.animated-name {
    font-size: 78px;
    font-weight: 700;
    color: white;
    margin-bottom: 20px;
    animation: softGlow 2.5s ease-in-out infinite alternate;
}

@keyframes softGlow {
    from {
        text-shadow: 0 0 6px rgba(255,255,255,0.2);
        transform: translateY(0px);
    }
    to {
        text-shadow: 0 0 12px rgba(200,220,255,0.4);
        transform: translateY(-4px);
    }
}

/* ===== GALAXY BACKGROUND ===== */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: blink 4s infinite ease-in-out;
}

@keyframes blink {
    0%,100% {opacity:0; transform:scale(0.5);}
    50% {opacity:1; transform:scale(1.2);}
}

.nebula {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.7;
    z-index: 0;
    background: radial-gradient(circle, rgba(120,140,255,0.15), transparent);
    animation: float 12s infinite alternate;
}

.nebula:nth-child(1){ top:10%; left:15%; }
.nebula:nth-child(2){ bottom:10%; right:10%; }

@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-40px);}
}

/* ===== HEADER ===== */
header {
    position: relative;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.nav-btn {
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    font-size: 14px;
    transition: 0.3s;
}

.nav-btn:hover {
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
    transform: translateY(-2px);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 90px 100px 0 100px;
}

.hero h2 {
    color: #aaa;
    letter-spacing: 2px;
}

.hero p {
    font-size: 1.4rem;
    color: #ddd;
    max-width: 600px;
    line-height: 1.6;
}

/* ===== HIRE ME BUTTON ===== */
.hire-btn {
    font-size: 18px;
    color: white;
    padding: 14px 34px;
    margin-top: 25px;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 30px;
    display: inline-block;
    font-weight: 600;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
}

.hire-btn:hover {
    transform: translateY(-4px) scale(1.06);
    border-color: rgba(255,255,255,0.8);
    box-shadow: 0 0 18px rgba(255,255,255,0.25),
                0 0 40px rgba(150,180,255,0.25);
}

.hire-btn::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 120%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: 0.6s;
}

.hire-btn:hover::after {
    left: 120%;
}

/* ===== PROFILE IMAGE ===== */
.profile-img {
    width: 420px;
    height: auto;
    border-radius: 20px;
    mix-blend-mode: lighten;
    filter: drop-shadow(0 0 25px rgba(120,140,255,0.4));
    background: rgba(255,255,255,0.03);
    padding: 10px;
    transition: 0.4s ease;
}

.profile-img:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 40px rgba(150,180,255,0.6));
}

.skill-box {
    padding: 14px 22px;
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
    font-size: 16px;
    color: white;
    transition: 0.3s;
    white-space: nowrap;
}

.skill-box:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.2),
                0 0 30px rgba(150,180,255,0.2);
}

/* ✅ MOBILE RESPONSIVE FIX */
@media (max-width: 768px) {

    .animated-name {
        font-size: 40px;
    }

    .hero p {
        font-size: 1rem;
    }

    .profile-img {
        width: 280px;
    }

}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div style="display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; width:100%; gap:30px;">
